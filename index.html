<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" href="favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#1e293b">
    <meta name="application-name" content="Springboard">
    <title>Springboard</title>
    <style>
      :root {
        --bg: #0f172a;
        --bg2: #111827;
        --panel: #111827;
        --panel2: #172033;
        --panel3: #202b42;
        --text: #eef2ff;
        --muted: #9eb0cf;
        --border: #30415f;
        --accent: #56ccf2;
        --accent2: #ffb454;
        --accent3: #73ffd2;
        --accent4: #ff8f40;
        --danger: #ff7b72;
        --ok: #9fda55;
        --warn: #ffb454;
        --shadow: rgba(0, 0, 0, 0.32);
        --button-accent-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 36%, var(--panel3)),
          color-mix(in srgb, var(--accent2) 14%, var(--panel2))
        );
        --button-accent-fg: #f8fbff;
        --btn-fg: color-mix(in srgb, var(--accent) 62%, var(--text));
        --btn-bg-1: color-mix(in srgb, var(--accent) 11%, var(--panel3));
        --btn-bg-2: color-mix(in srgb, var(--accent2) 6%, var(--panel2));
        --btn-border: color-mix(in srgb, var(--accent) 30%, var(--border));
        --btn-hover-fg: #ffffff;
        --btn-hover-bg-1: color-mix(in srgb, var(--accent) 24%, var(--panel3));
        --btn-hover-bg-2: color-mix(in srgb, var(--accent2) 10%, var(--panel2));
        --btn-hover-border: color-mix(
          in srgb,
          var(--accent) 62%,
          var(--border)
        );
        --btn-active-ring: color-mix(in srgb, var(--accent) 14%, transparent);
        --toggle-active-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 88%, white 0%),
          color-mix(in srgb, var(--accent2) 20%, var(--accent))
        );
        --toggle-active-fg: #ffffff;
        --toggle-active-border: color-mix(
          in srgb,
          var(--accent) 78%,
          var(--border)
        );
        --mode-toggle-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 88%, white 0%),
          color-mix(in srgb, var(--accent2) 20%, var(--accent))
        );
        --mode-toggle-fg: var(--active-ink);
        --mode-toggle-border: color-mix(
          in srgb,
          var(--accent) 80%,
          var(--border)
        );
        --tag-border: color-mix(in srgb, var(--accent3) 48%, var(--border));
        --tag-bg: color-mix(in srgb, var(--accent3) 12%, var(--panel2));
        --tag-fg: color-mix(in srgb, var(--accent3) 84%, var(--text));
        --tag-active-border: color-mix(
          in srgb,
          var(--accent) 78%,
          var(--border)
        );
        --tag-active-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 26%, var(--panel3)),
          color-mix(in srgb, var(--accent2) 8%, var(--panel2))
        );
        --tag-active-fg: var(--active-ink);
        --tag-match-border: color-mix(
          in srgb,
          var(--accent2) 78%,
          var(--border)
        );
        --tag-match-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent2) 24%, var(--panel3)),
          color-mix(in srgb, var(--accent) 12%, var(--panel2))
        );
        --tag-match-fg: var(--active-ink);
        --accent-ink: #0a1623;
        --active-ink: #102838;
        --checkbox-indicator: #ffffff;
        --checkbox-border-checked: color-mix(
          in srgb,
          var(--accent) 78%,
          var(--border)
        );
        --checkbox-shadow-checked:
          0 0 0 1px color-mix(in srgb, var(--accent) 22%, transparent),
          0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
      }
      body.theme-dark {
        --bg: #0b0f14;
        --bg2: #0f141b;
        --panel: #121923;
        --panel2: #182131;
        --panel3: #212c40;
        --text: #edf3ff;
        --muted: #99abc7;
        --border: #2f3f5b;
        --accent: #59d6ff;
        --accent2: #ffb454;
        --accent3: #73ffd2;
        --accent4: #ff8f40;
        --danger: #ff7b72;
        --ok: #9fda55;
        --warn: #ffb454;
        --shadow: rgba(0, 0, 0, 0.36);
        --active-ink: #102838;
        --button-accent-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 82%, #dff7ff),
          color-mix(in srgb, var(--accent2) 48%, #ffe1b8)
        );
        --button-accent-fg: var(--active-ink);
        --btn-fg: color-mix(in srgb, var(--accent) 62%, #f7fbff);
        --btn-bg-1: color-mix(in srgb, var(--accent) 12%, var(--panel3));
        --btn-bg-2: color-mix(in srgb, var(--accent2) 8%, var(--panel2));
        --btn-border: color-mix(in srgb, var(--accent) 28%, var(--border));
        --btn-hover-fg: #ffffff;
        --btn-hover-bg-1: color-mix(in srgb, var(--accent) 28%, var(--panel3));
        --btn-hover-bg-2: color-mix(in srgb, var(--accent2) 14%, var(--panel2));
        --btn-hover-border: color-mix(
          in srgb,
          var(--accent) 60%,
          var(--border)
        );
        --btn-active-ring: color-mix(in srgb, var(--accent) 16%, transparent);
        --toggle-active-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 82%, white 0%),
          color-mix(in srgb, var(--accent2) 18%, var(--accent))
        );
        --toggle-active-fg: var(--active-ink);
        --toggle-active-border: color-mix(
          in srgb,
          var(--accent) 76%,
          var(--border)
        );
        --mode-toggle-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 82%, white 0%),
          color-mix(in srgb, var(--accent2) 18%, var(--accent))
        );
        --mode-toggle-fg: var(--active-ink);
        --mode-toggle-border: color-mix(
          in srgb,
          var(--accent) 78%,
          var(--border)
        );
        --tag-active-border: color-mix(in srgb, var(--accent) 82%, white 8%);
        --tag-active-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 82%, white 10%),
          color-mix(in srgb, var(--accent2) 42%, #ffd8a6)
        );
        --tag-active-fg: #08131d;
        --tag-match-border: color-mix(in srgb, var(--accent2) 78%, white 6%);
        --tag-match-bg: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent2) 72%, #ffe0b5),
          color-mix(in srgb, var(--accent) 34%, #c9f4ff)
        );
        --tag-match-fg: #08131d;
        --checkbox-indicator: #08131d;
        --checkbox-border-checked: color-mix(
          in srgb,
          var(--accent) 84%,
          white 6%
        );
        --checkbox-shadow-checked:
          0 0 0 1px color-mix(in srgb, var(--accent) 28%, transparent),
          0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent);
      }
      body.theme-light {
        --bg: #f6f8fc;
        --bg2: #eef3fa;
        --panel: #ffffff;
        --panel2: #f7faff;
        --panel3: #e9f0fb;
        --text: #13233d;
        --muted: #50627f;
        --border: #cad7ea;
        --accent: #2563eb;
        --accent2: #7c3aed;
        --accent3: #079669;
        --accent4: #d97706;
        --danger: #c23b3b;
        --ok: #15803d;
        --warn: #b45309;
        --shadow: rgba(15, 23, 42, 0.08);
        --active-ink: #12385f;
        --button-accent-bg: linear-gradient(
          135deg,
          #5aa2ff 0%,
          #3b82f6 42%,
          #6d5efc 100%
        );
        --button-accent-fg: #ffffff;
        --btn-fg: color-mix(in srgb, var(--accent) 72%, #172554);
        --btn-bg-1: color-mix(in srgb, var(--accent) 12%, #ffffff);
        --btn-bg-2: color-mix(in srgb, var(--accent2) 7%, #f7faff);
        --btn-border: color-mix(in srgb, var(--accent) 26%, var(--border));
        --btn-hover-fg: #17356e;
        --btn-hover-bg-1: color-mix(in srgb, var(--accent) 18%, #ffffff);
        --btn-hover-bg-2: color-mix(in srgb, var(--accent2) 11%, #f3f7ff);
        --btn-hover-border: color-mix(
          in srgb,
          var(--accent) 52%,
          var(--border)
        );
        --btn-active-ring: color-mix(in srgb, var(--accent) 18%, transparent);
        --toggle-active-bg: linear-gradient(180deg, #3b82f6, #2563eb);
        --toggle-active-fg: #ffffff;
        --toggle-active-border: #2563eb;
        --mode-toggle-bg: linear-gradient(180deg, #3b82f6, #2563eb);
        --mode-toggle-fg: #ffffff;
        --mode-toggle-border: #2563eb;
        --tag-active-border: color-mix(in srgb, #5aa2ff 72%, #6d5efc 28%);
        --tag-active-bg: linear-gradient(
          135deg,
          #5aa2ff 0%,
          #3b82f6 42%,
          #6d5efc 100%
        );
        --tag-active-fg: #ffffff;
        --tag-match-border: color-mix(in srgb, #5aa2ff 72%, #6d5efc 28%);
        --tag-match-bg: linear-gradient(
          135deg,
          #5aa2ff 0%,
          #3b82f6 42%,
          #6d5efc 100%
        );
        --tag-match-fg: #ffffff;
        --checkbox-indicator: #ffffff;
        --checkbox-border-checked: #2563eb;
        --checkbox-shadow-checked:
          0 0 0 1px color-mix(in srgb, var(--accent) 18%, transparent),
          0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      body {
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top,
            color-mix(in srgb, var(--accent) 6%, transparent),
            transparent 28%
          ),
          linear-gradient(180deg, var(--bg), var(--bg2));
        background-attachment: fixed;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .hidden {
        display: none !important;
      }
      .app {
        max-width: 1840px;
        margin: 0 auto;
        padding: 10px;
      }
      .header,
      .toolbar,
      .section,
      .modal,
      .summary-card,
      .card,
      .preview {
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 8px 24px var(--shadow);
      }
      .header {
        border-radius: 16px;
        padding: 10px;
        margin-bottom: 10px;
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(
            260px,
            1.2fr
          ) auto auto auto auto;
        gap: 10px;
        align-items: center;
      }
      .app-title {
        font-size: 24px;
        font-weight: 700;
        color: var(--accent);
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .control,
      .select {
        border: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--panel3) 20%, var(--panel2)),
          var(--panel2)
        );
        color: var(--text);
        border-radius: 9px;
        padding: 8px 10px;
        min-height: 36px;
        font: inherit;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.05) inset,
          0 6px 16px color-mix(in srgb, var(--shadow) 65%, transparent);
      }
      .btn {
        border: 1px solid var(--btn-border);
        background: linear-gradient(180deg, var(--btn-bg-1), var(--btn-bg-2));
        color: var(--btn-fg);
        border-radius: 10px;
        padding: 8px 10px;
        min-height: 36px;
        font: inherit;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.08) inset,
          0 8px 18px color-mix(in srgb, var(--shadow) 70%, transparent);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
        font-weight: 700;
        transition:
          background 0.16s ease,
          color 0.16s ease,
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.16s ease;
      }
      .btn:hover {
        border-color: var(--btn-hover-border);
        color: var(--btn-hover-fg);
        background: linear-gradient(
          180deg,
          var(--btn-hover-bg-1),
          var(--btn-hover-bg-2)
        );
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 22%, transparent),
          0 0 0 4px var(--btn-active-ring),
          0 10px 22px color-mix(in srgb, var(--shadow) 72%, transparent);
        transform: translateY(-1px);
      }
      .btn:active {
        transform: translateY(0);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.04) inset,
          0 4px 12px color-mix(in srgb, var(--shadow) 55%, transparent);
      }
      .btn.primary {
        background: var(--button-accent-bg);
        color: var(--button-accent-fg);
        border-color: color-mix(in srgb, var(--accent) 68%, var(--btn-border));
        text-shadow: none;
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 32%, transparent),
          0 10px 20px color-mix(in srgb, var(--shadow) 62%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }
      .btn.primary:hover {
        color: var(--button-accent-fg);
        border-color: color-mix(in srgb, var(--accent) 78%, var(--btn-border));
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 78%, white 0%),
          color-mix(in srgb, var(--accent2) 22%, var(--accent))
        );
      }
      body.theme-dark .btn.primary {
        border-color: color-mix(in srgb, var(--accent) 80%, var(--btn-border));
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 36%, transparent),
          0 12px 24px color-mix(in srgb, var(--shadow) 62%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
      }
      body.theme-dark .btn.primary:hover {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 88%, #f0fbff),
          color-mix(in srgb, var(--accent2) 56%, #ffe8c7)
        );
        color: var(--active-ink);
      }
      .btn.small {
        min-height: 28px;
        padding: 5px 9px;
        font-size: 12px;
        font-weight: 700;
      }
      .btn.toggle.active,
      .mode-toggle.active {
        background: var(--toggle-active-bg, var(--button-accent-bg));
        color: var(--toggle-active-fg, var(--button-accent-fg));
        border-color: var(
          --toggle-active-border,
          color-mix(in srgb, var(--accent) 55%, var(--border))
        );
        text-shadow: none;
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 42%, transparent),
          0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent),
          0 12px 26px color-mix(in srgb, var(--shadow) 74%, transparent);
      }
      .btn.toggle:not(.warn).active:hover,
      .mode-toggle.active:hover {
        color: var(--toggle-active-fg, var(--button-accent-fg));
        border-color: color-mix(in srgb, var(--accent) 82%, var(--border));
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 86%, white 0%),
          color-mix(in srgb, var(--accent2) 20%, var(--accent))
        );
      }
      .btn.warn.active {
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--warn) 22%, var(--panel3)),
          color-mix(in srgb, var(--warn) 14%, var(--panel2))
        );
        color: var(--warn);
        border-color: color-mix(in srgb, var(--warn) 60%, var(--border));
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--warn) 22%, transparent),
          0 0 0 3px color-mix(in srgb, var(--warn) 10%, transparent),
          0 10px 22px color-mix(in srgb, var(--shadow) 72%, transparent);
      }
      .tabs,
      .actions,
      .badges,
      .members {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .tabs {
        padding: 4px;
        border: 1px solid color-mix(in srgb, var(--accent) 34%, var(--border));
        border-radius: 16px;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 13%, var(--panel2)),
          color-mix(in srgb, var(--accent2) 5%, var(--panel2))
        );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 12px 26px var(--shadow);
        justify-self: start;
      }
      .tabs .btn {
        min-height: 42px;
        padding: 9px 16px;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 0.03em;
        border-radius: 12px;
        background: transparent;
        border-color: transparent;
        color: color-mix(in srgb, var(--accent) 36%, var(--muted));
        box-shadow: none;
      }
      .tabs .btn:hover {
        color: var(--text);
        border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 14%, var(--panel3)),
          color-mix(in srgb, var(--accent2) 8%, var(--panel2))
        );
      }
      .tabs .btn.primary {
        color: var(--button-accent-fg);
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--accent) 82%, white 0%),
          color-mix(in srgb, var(--accent2) 18%, var(--accent))
        );
        border-color: color-mix(in srgb, var(--accent) 70%, var(--border));
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 42%, transparent),
          0 12px 26px var(--shadow);
      }
      .tabs .btn.primary:hover {
        color: var(--button-accent-fg);
      }
      .theme-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-self: end;
        min-width: 0;
      }
      .toolbar-cluster {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .mode-toggle {
        min-width: 116px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }
      .mode-toggle.active {
        background: var(
          --mode-toggle-bg,
          var(--toggle-active-bg, var(--button-accent-bg))
        );
        color: var(
          --mode-toggle-fg,
          var(--toggle-active-fg, var(--button-accent-fg))
        );
        border-color: var(
          --mode-toggle-border,
          var(
            --toggle-active-border,
            color-mix(in srgb, var(--accent) 55%, var(--border))
          )
        );
      }
      .section-drop-slot {
        min-height: 10px;
        margin: 4px 0;
        border-radius: 12px;
        border: 1px dashed transparent;
        transition:
          min-height 0.14s ease,
          margin 0.14s ease,
          background 0.14s ease,
          box-shadow 0.14s ease,
          border-color 0.14s ease,
          opacity 0.14s ease;
        opacity: 0.01;
      }
      .section-drop-slot.edge-top {
        min-height: 8px;
        margin-top: 0;
        margin-bottom: 4px;
      }
      body.section-dragging .section-drop-slot {
        min-height: 24px;
        margin: 8px 0;
        opacity: 1;
      }
      body.section-dragging .section-drop-slot.edge-top {
        min-height: 28px;
        margin-bottom: 8px;
      }
      .section-drop-slot.drag-over {
        outline: none;
        border-color: color-mix(in srgb, var(--accent) 52%, transparent);
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        box-shadow:
          inset 0 4px 0 0 color-mix(in srgb, var(--accent) 82%, transparent),
          0 0 0 4px color-mix(in srgb, var(--accent) 9%, transparent);
      }
      .toolbar {
        border-radius: 14px;
        padding: 10px;
        margin-bottom: 10px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
      .toolbar-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .toolbar-group.grow {
        flex: 1 1 520px;
        min-width: 320px;
      }
      .toolbar-group.grow .control {
        flex: 1 1 auto;
        min-width: 280px;
      }
      .input-wrap {
        position: relative;
        display: flex;
        flex: 1 1 auto;
        min-width: 280px;
        align-items: stretch;
      }
      .input-wrap .control {
        width: 100%;
        padding-right: 42px;
      }
      .search-hero-wrap {
        flex: 1 1 460px;
        min-width: 320px;
      }
      .search-hero-wrap .search-hero {
        width: 100%;
      }
      .input-clear {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
        background: color-mix(in srgb, var(--panel3) 72%, var(--panel));
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font: inherit;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.16s ease,
          color 0.16s ease,
          border-color 0.16s ease,
          background 0.16s ease,
          transform 0.16s ease;

    <script>
      const STORAGE_KEY = "commandBoardConfigV21";
      const PREFS_KEY = "commandBoardPrefsV21";
      const THEME_FAMILIES = [
        { id: "vibrant", label: "Vibrant", dark: "dark", light: "light" },
      ];
      const state = {
        config: loadConfig(),
        prefs: loadPrefs(),
        currentTab: "links",
        activeLinkTags: [],
        activeSearchTags: [],
        preview: { title: "", url: "", thumbnailUrl: "" },
        pendingImportMode: null,

        expandedNotes: {},

      const ui = {
        appTitle: document.getElementById("appTitle"),
        globalFilter: document.getElementById("globalFilter"),
        globalFilterClear: document.getElementById("globalFilterClear"),
        linksTabBtn: document.getElementById("linksTabBtn"),
        searchesTabBtn: document.getElementById("searchesTabBtn"),

        searchesTab: document.getElementById("searchesTab"),

        themeModeLightBtn: document.getElementById("themeModeLightBtn"),
        manageBtn: document.getElementById("manageBtn"),
        addSectionBtn: document.getElementById("addSectionBtn"),
        addLinkBtn: document.getElementById("addLinkBtn"),

        layoutSplitBtn: document.getElementById("layoutSplitBtn"),

        collapseAllLinksBtn: document.getElementById("collapseAllLinksBtn"),

        duplicatesBtn: document.getElementById("duplicatesBtn"),
        linksSummary: document.getElementById("linksSummary"),
        linksTagbar: document.getElementById("linksTagbar"),
        linkSections: document.getElementById("linkSections"),
        linksEmpty: document.getElementById("linksEmpty"),
        linksLayout: document.getElementById("linksLayout"),
        previewTitle: document.getElementById("previewTitle"),
        previewBody: document.getElementById("previewBody"),
        previewOpen: document.getElementById("previewOpen"),
        previewExitSplit: document.getElementById("previewExitSplit"),
        previewClear: document.getElementById("previewClear"),
        exportHtmlBtn: document.getElementById("exportHtmlBtn"),
        exportJsonBtn: document.getElementById("exportJsonBtn"),
        importReplaceBtn: document.getElementById("importReplaceBtn"),
        importMergeBtn: document.getElementById("importMergeBtn"),
        importFile: document.getElementById("importFile"),
        searchesSummary: document.getElementById("searchesSummary"),
        searchesTagbar: document.getElementById("searchesTagbar"),
        linksTagModeAnyBtn: document.getElementById("linksTagModeAnyBtn"),
        linksTagModeAllBtn: document.getElementById("linksTagModeAllBtn"),
        searchesTagModeAnyBtn: document.getElementById("searchesTagModeAnyBtn"),
        searchesTagModeAllBtn: document.getElementById("searchesTagModeAllBtn"),
        searchRunnerQuery: document.getElementById("searchRunnerQuery"),
        searchRunnerQueryClear: document.getElementById(
          "searchRunnerQueryClear",
        ),
        runSelectedBtn: document.getElementById("runSelectedBtn"),
        clearSearchSelectionBtn: document.getElementById(
          "clearSearchSelectionBtn",
        ),
        clearRunnerSelectionBtn: document.getElementById(
          "clearRunnerSelectionBtn",
        ),
        searchSelectionList: document.getElementById("searchSelectionList"),
        bundleSelectionList: document.getElementById("bundleSelectionList"),
        addSearchBtn: document.getElementById("addSearchBtn"),
        addBundleBtn: document.getElementById("addBundleBtn"),
        expandAllSearchSectionsBtn: document.getElementById(
          "expandAllSearchSectionsBtn",
        ),
        collapseAllSearchSectionsBtn: document.getElementById(
          "collapseAllSearchSectionsBtn",
        ),
        manageSearchesBtn: document.getElementById("manageSearchesBtn"),
        manageBundlesBtn: document.getElementById("manageBundlesBtn"),
        searchCards: document.getElementById("searchCards"),
        bundleCards: document.getElementById("bundleCards"),
        searchCount: document.getElementById("searchCount"),
        bundleCount: document.getElementById("bundleCount"),
        modalBackdrop: document.getElementById("modalBackdrop"),
        modalTitle: document.getElementById("modalTitle"),
        modalBody: document.getElementById("modalBody"),
        modalCloseBtn: document.getElementById("modalCloseBtn"),
        searchRunnerSection: document.getElementById("searchRunnerSection"),
        savedSearchesSection: document.getElementById("savedSearchesSection"),
        bundlesSection: document.getElementById("bundlesSection"),
      };
      function defaultConfigFromEmbedded() {
        try {
          return JSON.parse(
            document.getElementById("embeddedConfig").textContent,
          );
        } catch {
          return {
            version: 1,
            title: "Springboard",
            linkSections: [],
            searches: [],
            bundles: [],
          };
        }
      }
      function loadConfig() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return normalizeConfig(defaultConfigFromEmbedded());
          return normalizeConfig(JSON.parse(raw));
        } catch {
          return normalizeConfig(defaultConfigFromEmbedded());
        }
      }
      function legacyThemeToParts(themeValue) {
        const normalized = String(themeValue || "dark")
          .trim()
          .toLowerCase();
        const lightAliases = new Set([
          "light",
          "classic-light",
          "slate-light",
          "ocean-light",
          "forest-light",
          "rose-light",
          "violet-light",
          "amber-light",
          "catppuccin-latte",
          "catppuccin-light",
          "tokyo-light",
          "dracula-light",
        ]);
        const darkAliases = new Set([
          "dark",
          "classic-dark",
          "slate",
          "slate-dark",
          "ocean-dark",
          "forest",
          "forest-dark",
          "rose-dark",
          "violet-dark",
          "amber-dark",
          "catppuccin-mocha",
          "catppuccin-dark",
          "tokyo-night",
          "tokyo-dark",
          "dracula",
          "dracula-dark",
        ]);
        return {
          family: "vibrant",
          mode: lightAliases.has(normalized)
            ? "light"
            : darkAliases.has(normalized)
              ? "dark"
              : "dark",
        };
      }
      function currentThemeDefinition() {
        return (
          THEME_FAMILIES.find((theme) => theme.id == state.prefs.themeFamily) ||
          THEME_FAMILIES[0]
        );
      }
      function currentThemeClassName() {
        const theme = currentThemeDefinition();
        return state.prefs.themeMode == "light" ? theme.light : theme.dark;
      }
      function loadPrefs() {
        const defaults = {
          themeFamily: "vibrant",
          themeMode: "dark",
          linksLayout: "grid",
          favoritesOnly: false,
          hideEmptySections: true,
          showDuplicatesOnly: false,
          linkFilter: "",
          searchFilter: "",
          searchQuery: "",
          collapsedLinkSections: {},
          collapsedSearchSections: {},
          bundleEditorFilter: "",
          bundleEditorSelectedOnly: false,
          bundleEditorActiveTags: [],
        };
        try {
          const raw = localStorage.getItem(PREFS_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          const prefs = { ...defaults, ...parsed };
          if (!prefs.themeFamily || !prefs.themeMode) {
            const migrated = legacyThemeToParts(parsed.theme);
            prefs.themeFamily = prefs.themeFamily || migrated.family;
            prefs.themeMode = prefs.themeMode || migrated.mode;
          }
          return prefs;
        } catch {
          return { ...defaults };
        }
      }
      function saveConfig() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.config));
      }
      function savePrefs() {
        localStorage.setItem(PREFS_KEY, JSON.stringify(state.prefs));
      }
      function cryptoId(prefix = "id") {
        if (crypto?.randomUUID) return crypto.randomUUID();
        return `${prefix}-${Math.random().toString(36).slice(2)}-${Date.now().toString(36)}`;
      }
      function nowIso() {
        return new Date().toISOString();
      }
      function normalizeConfig(config) {
        const safe = {
          version: 1,
          title:
            typeof config?.title === "string" && config.title.trim()
              ? config.title.trim()
              : "Springboard",
          linkSections: Array.isArray(config?.linkSections)
            ? config.linkSections
            : [],
          searches: Array.isArray(config?.searches) ? config.searches : [],
          bundles: Array.isArray(config?.bundles) ? config.bundles : [],
        };
        safe.linkSections = safe.linkSections.map((section) => ({
          name:
            typeof section?.name === "string" && section.name.trim()
              ? section.name.trim()
              : "Untitled Section",
          color:
            typeof section?.color === "string" && section.color.trim()
              ? section.color.trim()
              : "#4f79ff",
          description:
            typeof section?.description === "string"
              ? section.description.trim()
              : "",
          notes: typeof section?.notes === "string" ? section.notes.trim() : "",
          links: Array.isArray(section?.links)
            ? section.links.map((link) => ({
                name:
                  typeof link?.name === "string" && link.name.trim()
                    ? link.name.trim()
                    : "Untitled Link",
                url: typeof link?.url === "string" ? link.url.trim() : "",
                description:
                  typeof link?.description === "string"
                    ? link.description.trim()
                    : "",
                notes: typeof link?.notes === "string" ? link.notes.trim() : "",
                favorite: Boolean(link?.favorite),
                lastEdited:
                  typeof link?.lastEdited === "string"
                    ? link.lastEdited.trim()
                    : "",
                preview: Boolean(link?.preview),
                previewUrl:
                  typeof link?.previewUrl === "string"
                    ? link.previewUrl.trim()
                    : "",
                thumbnailUrl:
                  typeof link?.thumbnailUrl === "string"
                    ? link.thumbnailUrl.trim()
                    : "",
                tags: Array.isArray(link?.tags)
                  ? link.tags.map((tag) => String(tag).trim()).filter(Boolean)
                  : [],
              }))
            : [],
        }));
        safe.searches = safe.searches.map((search) => ({
          id:
            typeof search?.id === "string" && search.id.trim()
              ? search.id.trim()
              : cryptoId("search"),
          name:
            typeof search?.name === "string" && search.name.trim()
              ? search.name.trim()
              : "Untitled Search",
          urlTemplate:
            typeof search?.urlTemplate === "string"
              ? search.urlTemplate.trim()
              : "",
          description:
            typeof search?.description === "string"
              ? search.description.trim()
              : "",
          notes: typeof search?.notes === "string" ? search.notes.trim() : "",
          tags: Array.isArray(search?.tags)
            ? search.tags.map((tag) => String(tag).trim()).filter(Boolean)
            : [],
          lastEdited:
            typeof search?.lastEdited === "string"
              ? search.lastEdited.trim()
              : "",
        }));
        const searchIds = new Set(safe.searches.map((search) => search.id));
        safe.bundles = safe.bundles.map((bundle) => ({
          id:
            typeof bundle?.id === "string" && bundle.id.trim()
              ? bundle.id.trim()
              : cryptoId("bundle"),
          name:
            typeof bundle?.name === "string" && bundle.name.trim()
              ? bundle.name.trim()
              : "Untitled Bundle",
          description:
            typeof bundle?.description === "string"
              ? bundle.description.trim()
              : "",
          notes: typeof bundle?.notes === "string" ? bundle.notes.trim() : "",
          color:
            typeof bundle?.color === "string" && bundle.color.trim()
              ? bundle.color.trim()
              : "#4f79ff",
          searchIds: Array.isArray(bundle?.searchIds)
            ? bundle.searchIds
                .map((id) => String(id))
                .filter((id) => searchIds.has(id))
            : [],
          tags: Array.isArray(bundle?.tags)
            ? bundle.tags.map((tag) => String(tag).trim()).filter(Boolean)
            : [],
          lastEdited:
            typeof bundle?.lastEdited === "string"
              ? bundle.lastEdited.trim()
              : "",
        }));
        return safe;
      }
      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
      function canonicalUrl(url) {
        try {
          const parsed = new URL(url);
          return `${parsed.hostname.toLowerCase()}${parsed.pathname}${parsed.search}`;
        } catch {
          return String(url || "")
            .trim()
            .toLowerCase();
        }
      }
      function duplicateLinkKeySet() {
        const counts = new Map();
        state.config.linkSections.forEach((section) =>
          section.links.forEach((link) => {
            const key = canonicalUrl(link.url);
            if (!key) return;
            counts.set(key, (counts.get(key) || 0) + 1);
          }),
        );
        return new Set(
          [...counts.entries()]
            .filter(([, count]) => count > 1)
            .map(([key]) => key),
        );
      }
      function renderThemeOptions() {
        if (ui.themeFamilySelect) {
          ui.themeFamilySelect.innerHTML = THEME_FAMILIES.map(
            (theme) =>
              `<option value="${escapeHtml(theme.id)}">${escapeHtml(theme.label)}</option>`,
          ).join("");
          ui.themeFamilySelect.value = currentThemeDefinition().id;
          ui.themeFamilySelect.classList.add("hidden");
        }
        const isLight = state.prefs.themeMode == "light";
        if (ui.themeModeDarkBtn) {
          const isActive = !isLight;
          ui.themeModeDarkBtn.classList.toggle("active", isActive);
          ui.themeModeDarkBtn.setAttribute("aria-pressed", String(isActive));
        }
        if (ui.themeModeLightBtn) {
          const isActive = isLight;
          ui.themeModeLightBtn.classList.toggle("active", isActive);
          ui.themeModeLightBtn.setAttribute("aria-pressed", String(isActive));
        }
      }
      function applyTheme() {
        if (
          !THEME_FAMILIES.some((theme) => theme.id == state.prefs.themeFamily)
        )
          state.prefs.themeFamily = "vibrant";
        if (!["dark", "light"].includes(state.prefs.themeMode))
          state.prefs.themeMode = "dark";
        [...document.body.classList]
          .filter((cls) => cls.startsWith("theme-"))
          .forEach((cls) => document.body.classList.remove(cls));
        document.body.classList.add(`theme-${currentThemeClassName()}`);
        renderThemeOptions();
        document.title = state.config.title || "Springboard";
        ui.appTitle.textContent = state.config.title || "Springboard";
      }
      function cycleTheme() {
        state.prefs.themeMode =
          state.prefs.themeMode == "light" ? "dark" : "light";
        savePrefs();
        applyTheme();
      }
      function setTab(tabName) {
        state.currentTab = tabName;
        ui.linksTab.classList.toggle("hidden", tabName !== "links");
        ui.searchesTab.classList.toggle("hidden", tabName !== "searches");
        ui.linksTabBtn.classList.toggle("primary", tabName === "links");
        ui.searchesTabBtn.classList.toggle("primary", tabName === "searches");
        ui.globalFilter.placeholder =
          tabName == "links"
            ? "Filter links, sections, tags, notes"
            : "Filter searches, bundles, tags";
        ui.globalFilter.value =
          tabName == "links"
            ? state.prefs.linkFilter
            : state.prefs.searchFilter;
      }
      function linkSectionKey(section, sectionIndex) {
        return `link:${section.name}::${sectionIndex}`;
      }
      function isLinkSectionCollapsed(section, sectionIndex) {
        return Boolean(
          state.prefs.collapsedLinkSections?.[
            linkSectionKey(section, sectionIndex)
          ],
        );
      }
      function setLinkSectionCollapsed(section, sectionIndex, collapsed) {
        state.prefs.collapsedLinkSections ||= {};
        state.prefs.collapsedLinkSections[
          linkSectionKey(section, sectionIndex)
        ] = Boolean(collapsed);
        savePrefs();
      }
      function toggleLinkSection(section, sectionIndex) {
        setLinkSectionCollapsed(
          section,
          sectionIndex,
          !isLinkSectionCollapsed(section, sectionIndex),
        );
        renderLinks();
      }
      function setAllLinkSectionsCollapsed(collapsed) {
        state.prefs.collapsedLinkSections = {};
        state.config.linkSections.forEach((section, sectionIndex) => {
          state.prefs.collapsedLinkSections[
            linkSectionKey(section, sectionIndex)
          ] = Boolean(collapsed);
        });
        savePrefs();
        renderLinks();
      }
      function isSearchSectionCollapsed(key) {
        return Boolean(state.prefs.collapsedSearchSections?.[key]);
      }
      function setSearchSectionCollapsed(key, collapsed) {
        state.prefs.collapsedSearchSections ||= {};
        state.prefs.collapsedSearchSections[key] = Boolean(collapsed);
        savePrefs();
      }
      function toggleSearchSection(key) {
        setSearchSectionCollapsed(key, !isSearchSectionCollapsed(key));
        renderSearches();
      }
      function setAllSearchSectionsCollapsed(collapsed) {

                  item.search.lastEdited = nowIso();
                });
              } else if (config.scope == "bundlesEditor") {
                selectedItems.forEach((item) => {
                  item.bundle.tags = removeTagValues(
                    mergeUniqueValues(item.bundle.tags, addTags),
                    removeTags,
                  );
                  item.bundle.lastEdited = nowIso();
                });
              }
              saveConfig();
              render();
              reopen();
            },
            [`${scope}BulkApplySectionBtn`]: () => {
              if (!state.config.linkSections.length)
                return alert("Create a section first.");
              const targetSectionIndex = Number(
                modalValue(`${scope}BulkSectionSelect`),
              );
              if (
                !Number.isInteger(targetSectionIndex) ||
                !state.config.linkSections[targetSectionIndex]
              )
                return alert("Choose a section.");
              const mode =
                modalValue(`${scope}BulkSectionModeSelect`) || "move";
              if (mode == "copy") {
                const copies = selectedItems.map((item) => ({
                  ...structuredClone(item.link),
                  lastEdited: nowIso(),
                }));
                state.config.linkSections[targetSectionIndex].links.push(
                  ...copies,
                );
              } else {
                const grouped = new Map();
                selectedItems.forEach((item) => {
                  if (!grouped.has(item.sectionIndex))
                    grouped.set(item.sectionIndex, []);
                  grouped.get(item.sectionIndex).push(item);
                });
                grouped.forEach((groupItems, sourceSectionIndex) => {
                  const sourceSection =
                    state.config.linkSections[sourceSectionIndex];
                  if (!sourceSection) return;
                  const moveSet = new Set(
                    groupItems.map((item) => item.linkIndex),
                  );
                  const moved = [];
                  sourceSection.links = sourceSection.links.filter(
                    (link, index) => {
                      if (!moveSet.has(index)) return true;
                      moved.push({ ...link, lastEdited: nowIso() });
                      return false;
                    },
                  );
                  state.config.linkSections[targetSectionIndex].links.push(
                    ...moved,
                  );
                });
              }
              saveConfig();
              render();
              reopen();
            },
            [`${scope}BulkApplyBundleBtn`]: () => {
              const bundleId = modalValue(`${scope}BulkBundleSelect`);
              const bundle = state.config.bundles.find(
                (item) => item.id == bundleId,
              );
              if (!bundle) return alert("Choose a bundle.");
              bundle.searchIds = [
                ...new Set([
                  ...(bundle.searchIds || []),
                  ...selectedItems.map((item) => item.search.id),
                ]),
              ];
              bundle.lastEdited = nowIso();
              saveConfig();
              render();
              reopen();
            },
            [`${scope}BulkCancelBtn`]: reopen,
          });
          syncTagState();
        });
      }
      function normalizeManagerStateInput(scope, managerState) {
        return isModalManagerState(managerState)
          ? managerState
          : createModalManagerState(scope);
      }
      function reopenCollectionEditor(scope, managerState) {
        const openers = {
          linksEditor: openLinksEditorManager,
          searchesEditor: openSearchesEditorManager,
          bundlesEditor: openBundlesEditorManager,
        };
        const openFn = openers[scope];
        if (typeof openFn == "function") openFn(managerState);
      }
      function openCollectionEditorManager(config, managerState = null) {
        const {
          scope,
          title,
          checkboxSelector,
          nounSingular,
          nounPlural = `${nounSingular}s`,
          entityLabel,
          addButtonLabel,
          addMultipleLabel,
          bulkType,
          getItems,
          getTags,
          getSearchText,
          renderItemCard,
          bindItemActions,
          onAdd,
          onAddMultiple,
          onDeleteSelected,
        } = config;

        const editorState = normalizeManagerStateInput(scope, managerState);

        function renderBody(focus = {}) {
          requestModalManagerFilterFocus(editorState, focus);
          const { items, shown } = currentCollectionItems(config, editorState);
          const html = modalManagerShell(
            renderManagerBulkTools(
              scope,
              entityLabel,
              addButtonLabel,
              addMultipleLabel,
              bulkType,
              {
                filterValue: editorState.filter,
                activeTags: editorState.activeTags,
                allTags: modalManagerTagSet(items, getTags),
                selectedOnly: editorState.selectedOnly,
                selectedCount: editorState.selectedValues.size,
                extraButtons: [
                  modalActionButton(`${scope}BulkEditBtn`, "Bulk Edit"),
                ],
              },
            ),
            modalCardsGrid(
              shown.length
                ? shown.map((item) => renderItemCard(item, editorState))
                : [
                    modalCard(
                      `No matching ${nounPlural}`,
                      `<div class="empty">No ${nounPlural} match.</div>`,
                    ),
                  ],
              "260px",
            ),
          );

          openModal(
            title,
            html,
            () => {
              bindModalManagerToolbar(
                scope,
                editorState,
                renderBody,
                checkboxSelector,
                nounSingular,
                nounPlural,
              );
              bindModalActions({
                [`${scope}AddBtn`]: onAdd,
                [`${scope}AddMultipleBtn`]: onAddMultiple,
                [`${scope}BulkEditBtn`]: () =>
                  openCollectionBulkActionsModal(config, editorState),
                [`${scope}DeleteSelectedBtn`]: () =>
                  onDeleteSelected(editorState, renderBody),
              });
              bindItemActions(editorState, renderBody);
            },
            {
              type: "manager",
              scope,
              managerState: editorState,
              rerender: renderBody,
            },
          );
        }

        renderBody();
      }
      function openLinksEditorManager(managerState = null) {
        return openCollectionEditorManager(
          {
            scope: "linksEditor",
            title: "Edit Links",
            checkboxSelector: ".bulk-link-manager-select",
            nounSingular: "link",
            nounPlural: "links",
            entityLabel: "Links",
            addButtonLabel: "Add Section",
            addMultipleLabel: "Add Multiple Links",
            bulkType: "link",
            getItems: () =>
              state.config.linkSections.flatMap((section, sectionIndex) =>
                section.links.map((link, linkIndex) => ({
                  key: `${sectionIndex}:${linkIndex}`,
                  sectionIndex,
                  linkIndex,
                  sectionName: section.name,
                  sectionColor: section.color || "#4f79ff",
                  link,
                })),
              ),
            getTags: (item) => item.link.tags || [],
            getSearchText: (item) =>
              [
                item.link.name,
                item.link.url,
                item.link.description,
                item.link.notes,
                item.sectionName,
                (item.link.tags || []).join(" "),
              ].join(" "),
            renderItemCard: (item, editorState) =>
              renderManagerSelectableCard({
                iconHtml: renderFaviconIcon(item.link.url, item.link.name),
                title: item.link.name,
                checkboxClass: "bulk-link-manager-select",
                checkboxValue: item.key,
                checkboxChecked: editorState.selectedValues.has(item.key),
                checkboxLabel: `Select link ${item.link.name}`,
                description: `Section: ${item.sectionName}${item.link.description ? ` • ${item.link.description}` : ""}`,
                urlText: item.link.url || "",
                badges: [formatEditedBadge(item.link.lastEdited)],
                tags: item.link.tags || [],
                activeTags: editorState.activeTags,
                tagScope: "linksEditor",
                actionsHtml: modalActionRow([
                  `<button class="btn small" data-link-editor-open="${escapeHtml(item.key)}">Edit Link</button>`,
                  `<button class="btn small" data-section-editor-open="${escapeHtml(String(item.sectionIndex))}">Edit Section</button>`,
                  `<button class="btn small" data-add-link-to-section="${escapeHtml(String(item.sectionIndex))}">Add Link</button>`,
                ]),
                style: `border-left:5px solid ${item.sectionColor};`,
                selected: editorState.selectedValues.has(item.key),
              }),
            bindItemActions: () => {
              bindModalDataActions("data-link-editor-open", (value) => {
                const [sectionIndexRaw, linkIndexRaw] =
                  String(value).split(":");
                openLinkEditor(Number(sectionIndexRaw), Number(linkIndexRaw));
              });
              bindModalDataActions("data-section-editor-open", (value) =>
                openSectionEditor(Number(value)),
              );
              bindModalDataActions("data-add-link-to-section", (value) =>
                openLinkEditor(Number(value), null),
              );
            },
            onAdd: () => openSectionEditor(),
            onAddMultiple: () => {
              if (!state.config.linkSections.length)
                return alert("Create a section first.");
              openBulkLinkAddModal(null, false);
            },
            onDeleteSelected: (editorState, renderBody) => {
              const selected = [...editorState.selectedValues];
              if (!selected.length) return;
              if (
                !confirm(
                  `Delete ${selected.length} selected link${selected.length == 1 ? "" : "s"}?`,
                )
              )
                return;
              const bySection = new Map();
              selected.forEach((key) => {
                const [sectionIndexRaw, linkIndexRaw] = String(key).split(":");
                const sectionIndex = Number(sectionIndexRaw);
                const linkIndex = Number(linkIndexRaw);
                if (
                  !Number.isInteger(sectionIndex) ||
                  !Number.isInteger(linkIndex)
                )
                  return;
                if (!bySection.has(sectionIndex))
                  bySection.set(sectionIndex, []);
                bySection.get(sectionIndex).push(linkIndex);
              });
              [...bySection.entries()].forEach(
                ([sectionIndex, linkIndexes]) => {
                  const section = state.config.linkSections[sectionIndex];
                  if (!section) return;
                  const removeSet = new Set(linkIndexes);
                  section.links = section.links.filter(
                    (_, linkIndex) => !removeSet.has(linkIndex),
                  );
                },
              );
              editorState.selectedValues.clear();
              saveConfig();
              render();
              renderBody();
            },
          },
          managerState,
        );
      }
      function openSearchesEditorManager(managerState = null) {
        return openCollectionEditorManager(
          {
            scope: "searchesEditor",
            title: "Edit Searches",
            checkboxSelector: ".bulk-search-select",
            nounSingular: "search",
            nounPlural: "searches",
            entityLabel: "Searches",
            addButtonLabel: "Add Search",
            addMultipleLabel: "Add Multiple",
            bulkType: "search",
            getItems: () =>
              state.config.searches.map((search) => ({
                key: search.id,
                search,
              })),
            getTags: (item) => item.search.tags || [],
            getSearchText: (item) =>
              [
                item.search.name,
                item.search.urlTemplate,
                item.search.description,
                item.search.notes,
                (item.search.tags || []).join(" "),
              ].join(" "),
            renderItemCard: (item, editorState) =>
              renderManagerSelectableCard({
                iconHtml: renderFaviconIcon(item.search.urlTemplate, item.search.name),
                title: item.search.name,
                checkboxClass: "bulk-search-select",
                checkboxValue: item.key,
                checkboxChecked: editorState.selectedValues.has(item.key),
                checkboxLabel: `Select search ${item.search.name}`,
                description: item.search.description,
                urlText: item.search.urlTemplate,
                badges: [formatEditedBadge(item.search.lastEdited)],
                tags: item.search.tags || [],
                activeTags: editorState.activeTags,
                tagScope: "searchesEditor",
                actionsHtml: modalActionRow([
                  `<button class="btn small" data-search-editor-open="${escapeHtml(item.key)}">Edit Search</button>`,
                ]),
                selected: editorState.selectedValues.has(item.key),
              }),
            bindItemActions: () => {
              bindModalDataActions("data-search-editor-open", (value) =>
                openSearchEditor(value),
              );
            },
            onAdd: () => openSearchEditor(),
            onAddMultiple: () => openBulkSearchAddModal(true),
            onDeleteSelected: (editorState, renderBody) => {
              const selected = [...editorState.selectedValues];
              if (!selected.length) return;
              if (
                !confirm(
                  `Delete ${selected.length} selected search${selected.length == 1 ? "" : "es"}?`,
                )
              )
                return;
              state.config.searches = state.config.searches.filter(
                (search) => !editorState.selectedValues.has(search.id),
              );
              state.config.bundles.forEach((bundle) => {
                bundle.searchIds = bundle.searchIds.filter(
                  (id) => !editorState.selectedValues.has(id),
                );
                bundle.lastEdited = nowIso();
              });
              editorState.selectedValues.clear();
              saveConfig();
              render();
              renderBody();
            },
          },
          managerState,
        );
      }
      function openBundlesEditorManager(managerState = null) {
        return openCollectionEditorManager(
          {
            scope: "bundlesEditor",
            title: "Edit Bundles",
            checkboxSelector: ".bulk-bundle-select",
            nounSingular: "bundle",
            nounPlural: "bundles",
            entityLabel: "Bundles",
            addButtonLabel: "Add Bundle",
            addMultipleLabel: "Add Multiple",
            bulkType: "bundle",
            getItems: () =>
              state.config.bundles.map((bundle) => ({
                key: bundle.id,
                bundle,
              })),
            getTags: (item) => item.bundle.tags || [],
            getSearchText: (item) =>
              [
                item.bundle.name,
                item.bundle.description,
                item.bundle.notes,
                (item.bundle.tags || []).join(" "),
              ].join(" "),
            renderItemCard: (item, editorState) =>
              renderManagerSelectableCard({
                iconHtml: renderGlyphIcon("B"),
                title: item.bundle.name,
                checkboxClass: "bulk-bundle-select",
                checkboxValue: item.key,
                checkboxChecked: editorState.selectedValues.has(item.key),
                checkboxLabel: `Select bundle ${item.bundle.name}`,
                description: item.bundle.description,
                badges: [
                  `<span class="badge member-count-badge">${item.bundle.searchIds.length} member${item.bundle.searchIds.length == 1 ? "" : "s"}</span>`,
                  formatEditedBadge(item.bundle.lastEdited),
                ],
                tags: item.bundle.tags || [],
                activeTags: editorState.activeTags,
                tagScope: "bundlesEditor",
                actionsHtml: modalActionRow([
                  `<button class="btn small" data-bundle-editor-open="${escapeHtml(item.key)}">Edit Bundle</button>`,
                ]),
                style: `border-left:5px solid ${item.bundle.color};`,
                selected: editorState.selectedValues.has(item.key),
              }),
            bindItemActions: () => {
              bindModalDataActions("data-bundle-editor-open", (value) =>
                openBundleEditor(value),
              );
            },
            onAdd: () => openBundleEditor(),
            onAddMultiple: () => openBulkBundleAddModal(true),
            onDeleteSelected: (editorState, renderBody) => {
              const selected = [...editorState.selectedValues];
              if (!selected.length) return;
              if (
                !confirm(
                  `Delete ${selected.length} selected bundle${selected.length == 1 ? "" : "s"}?`,
                )
              )
                return;
              state.config.bundles = state.config.bundles.filter(
                (bundle) => !editorState.selectedValues.has(bundle.id),
              );
              editorState.selectedValues.clear();
              saveConfig();
              render();
              renderBody();
            },
          },
          managerState,
        );
      }
      function runnerSearchIds() {
        return Array.isArray(state.prefs.runnerSearchIds)
          ? state.prefs.runnerSearchIds.map(String)
          : [];
      }
      function runnerBundleMemberIds(bundle) {
        return Array.isArray(bundle?.searchIds)
          ? bundle.searchIds.map(String)
          : [];
      }
      function selectedRunnerSearchIdSet() {
        return new Set(runnerSearchIds());
      }
      function syncRunnerSelectionStateToConfig() {
        const validSearchIds = new Set(
          state.config.searches.map((search) => String(search.id)),
        );
        const nextSearchIds = runnerSearchIds().filter((id) =>
          validSearchIds.has(id),
        );
        const staleBundleIds = Array.isArray(state.prefs.runnerBundleIds)
          ? state.prefs.runnerBundleIds.length
          : 0;
        const changed =
          nextSearchIds.length != runnerSearchIds().length ||
          staleBundleIds > 0;
        if (changed) {
          state.prefs.runnerSearchIds = nextSearchIds;
          state.prefs.runnerBundleIds = [];
          savePrefs();
        }
      }
      function setRunnerSearchSelection(searchIds) {
        state.prefs.runnerSearchIds = [
          ...new Set((searchIds || []).map(String)),
        ];
        state.prefs.runnerBundleIds = [];
        syncRunnerSelectionStateToConfig();
        savePrefs();
      }
      function renderRunnerSelectionLists() {
        if (!ui.searchSelectionList || !ui.bundleSelectionList) return;
        syncRunnerSelectionStateToConfig();
        ui.searchSelectionList.innerHTML = state.config.searches.length
          ? state.config.searches.map((search) => renderRunnerSearchItem(search)).join("")
          : `<div class="empty">No searches.</div>`;
        ui.bundleSelectionList.innerHTML = state.config.bundles.length
          ? state.config.bundles.map((bundle) => renderRunnerBundleItem(bundle)).join("")
          : `<div class="empty">No bundles.</div>`;
        bindSearchSelectionSync();
        applyGlobalCheckboxStates(ui.searchesTab || document);
      }
      function bindSearchSelectionSync() {
        bindRunnerSelectionSync(ui.searchSelectionList);
        bindRunnerSelectionSync(ui.bundleSelectionList);
      }
      function bindRunnerCardSelectionSync() {
        bindRunnerSelectionSync(ui.searchCards);
        bindRunnerSelectionSync(ui.bundleCards);
      }
      function bindRunnerSelectionSync(root = document) {
        if (!root) return;
        root
          .querySelectorAll('[data-runner-search-toggle="true"]')
          .forEach((input) => {
            if (input.dataset.runnerSelectionBound === "true") return;
            input.dataset.runnerSelectionBound = "true";
            input.addEventListener("change", () => {
              const values = selectedRunnerSearchIdSet();
              const value = String(input.value);
              if (input.checked) values.add(value);
              else values.delete(value);
              setRunnerSearchSelection([...values]);
              renderSearches();
              renderRunnerSelectionLists();
            });
          });
        root
          .querySelectorAll('[data-runner-bundle-toggle="true"]')
          .forEach((input) => {
            if (input.dataset.runnerSelectionBound === "true") return;
            input.dataset.runnerSelectionBound = "true";
            input.addEventListener("change", () => {
              const bundle = state.config.bundles.find(
                (item) => item.id == String(input.value),
              );
              if (!bundle) return;
              const memberIds = runnerBundleMemberIds(bundle);
              const values = selectedRunnerSearchIdSet();
              if (input.checked) memberIds.forEach((id) => values.add(id));
              else memberIds.forEach((id) => values.delete(id));
              setRunnerSearchSelection([...values]);
              renderSearches();
              renderRunnerSelectionLists();
            });
          });
        applyGlobalCheckboxStates(root);
      }
      function clearRunnerSelection() {
        setRunnerSearchSelection([]);
        renderSearches();
        renderRunnerSelectionLists();
      }
      function clearSearchRunnerFilters() {
        state.activeSearchTags.length = 0;
        state.prefs.searchQuery = "";
        if (ui.searchRunnerQuery) ui.searchRunnerQuery.value = "";
        savePrefs();
        syncInputClearButtons();
      }
      function clearSearchSelection() {
        clearRunnerSelection();
        clearSearchRunnerFilters();
        renderSearches();
      }
      function openSearch(searchOrId, query = null) {
        const search =
          typeof searchOrId == "string"
            ? state.config.searches.find((item) => item.id == searchOrId)
            : searchOrId;
        if (!search?.urlTemplate) return;
        const value =
          query === null
            ? ui.searchRunnerQuery?.value || state.prefs.searchQuery || ""
            : query;
        const url = search.urlTemplate.includes("%s")
          ? search.urlTemplate.replaceAll("%s", encodeURIComponent(value))
          : search.urlTemplate;
        window.open(url, "_blank", "noopener");
      }
      function runSelectedSearches() {
        const query =
          ui.searchRunnerQuery?.value || state.prefs.searchQuery || "";
        const selectedIds = [...selectedRunnerSearchIdSet()];
        if (!selectedIds.length) {
          alert("Select at least one search or bundle.");
          return;
        }
        selectedIds.forEach((id) => openSearch(id, query));
      }
      function exportJson() {
        downloadFile(
          "command-board.json",
          JSON.stringify(state.config, null, 2),
          "application/json;charset=utf-8",
        );
      }
      function exportHtmlSnapshot() {
        const cloneDoc = document.documentElement.cloneNode(true);
        const embedded = cloneDoc.querySelector("#embeddedConfig");
        if (embedded)
          embedded.textContent = JSON.stringify(state.config, null, 2);
        const html = "<!DOCTYPE html>\n" + cloneDoc.outerHTML;
        downloadFile("command-board.html", html, "text/html;charset=utf-8");
      }
      function mergeImport(target, incoming) {
        const base = structuredClone(target);
        base.title = incoming.title || base.title;
        const sectionMap = new Map(
          base.linkSections.map((section) => [
            section.name.toLowerCase(),
            section,
          ]),
        );
        incoming.linkSections.forEach((inSection) => {
          const key = inSection.name.toLowerCase();
          if (!sectionMap.has(key)) {
            base.linkSections.push(structuredClone(inSection));
            sectionMap.set(
              key,
              base.linkSections[base.linkSections.length - 1],
            );
            return;
          }
          const targetSection = sectionMap.get(key);
          inSection.links.forEach((inLink) => {
            const existing = targetSection.links.find(
              (link) => canonicalUrl(link.url) == canonicalUrl(inLink.url),
            );
            if (!existing) targetSection.links.push(structuredClone(inLink));
          });
        });
        const searchByKey = new Map(
          base.searches.map((search) => [
            `${search.name.toLowerCase()}|${search.urlTemplate}`,
            search,
          ]),
        );
        const idMap = new Map();
        incoming.searches.forEach((inSearch) => {
          const key = `${inSearch.name.toLowerCase()}|${inSearch.urlTemplate}`;
          const existing = searchByKey.get(key);
          if (existing) idMap.set(inSearch.id, existing.id);
          else {
            const copy = structuredClone(inSearch);
            if (base.searches.some((search) => search.id == copy.id))
              copy.id = cryptoId("search");
            base.searches.push(copy);
            searchByKey.set(key, copy);
            idMap.set(inSearch.id, copy.id);
          }
        });
        const bundleMap = new Map(
          base.bundles.map((bundle) => [bundle.name.toLowerCase(), bundle]),
        );
        incoming.bundles.forEach((inBundle) => {
          const mappedIds = inBundle.searchIds
            .map((id) => idMap.get(id))
            .filter(Boolean);
          const existing = bundleMap.get(inBundle.name.toLowerCase());
          if (!existing) {
            const copy = structuredClone(inBundle);
            if (base.bundles.some((bundle) => bundle.id == copy.id))
              copy.id = cryptoId("bundle");
            copy.searchIds = mappedIds;
            base.bundles.push(copy);
            bundleMap.set(copy.name.toLowerCase(), copy);
          } else {
            existing.searchIds = [
              ...new Set([...existing.searchIds, ...mappedIds]),
            ];
            existing.tags = [
              ...new Set([...(existing.tags || []), ...(inBundle.tags || [])]),
            ];
          }
        });
        return normalizeConfig(base);
      }
      function handleImport(file, mode) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const imported = normalizeConfig(
              JSON.parse(String(reader.result || "")),
            );
            state.config =
              mode == "merge" ? mergeImport(state.config, imported) : imported;
            saveConfig();
            render();
          } catch {
            alert("Invalid JSON file.");
          }
        };
        reader.readAsText(file);
      }
      function downloadFile(name, content, mime) {
        const blob = new Blob([content], { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }
      function startupSmokeCheck() {
        const checks = [
          ["renderLinks", () => renderLinks()],
          ["renderSearches", () => renderSearches()],
          ["renderPreview", () => renderPreview()],
          ["renderHeaderState", () => renderHeaderState()],
        ];
        checks.forEach(([name, fn]) => {
          try {
            fn();
          } catch (error) {
            throw new Error(`${name} failed: ${error?.message || error}`);
          }
        });
      }
      try {
        initializeApp();
        startupSmokeCheck();
      } catch (error) {
        console.error("[Springboard] Startup failed", error);
        showStartupError(
          `The board could not finish loading.\n\n${error?.message || error}`,
        );
      }
